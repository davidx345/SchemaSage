name: Deploy SchemaSage Microservices

on:
  push:
    branches:
      - main
    # Only trigger if something in the services folder changes
    paths:
      - 'services/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # If one deployment fails, let the others continue!
      matrix:
        include:
          # MAPPING: Folder Name  -->  Heroku App Name
          - service: ai-chat
            app_name: schemasage-ai-chat
          - service: api-gateway
            app_name: schemasage-api-gateway
          - service: authentication
            app_name: schemasage-auth
          - service: code-generation
            app_name: schemasage-code-generation
          - service: database-migration
            app_name: schemasage-database-migration
          - service: project-management
            app_name: schemasage-project-management
          - service: schema-detection
            app_name: schemasage-schema-detection
          - service: websocket-realtime
            app_name: schemasage-websocket-realtime

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # CRITICAL: Loads full history for git subtree to work

      # This smart step checks WHICH folder actually changed
      - name: Check for changes in ${{ matrix.service }}
        id: check_changes
        uses: dorny/paths-filter@v2
        with:
          filters: |
            src:
              - 'services/${{ matrix.service }}/**'

      # Only run this step if the folder changed
      - name: Deploy ${{ matrix.service }} to Heroku
        if: steps.check_changes.outputs.src == 'true'
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }} 
          HEROKU_EMAIL: ${{ secrets.HEROKU_EMAIL }} 
        run: |
          echo "🚀 Detecting changes in 'services/${{ matrix.service }}'..."
          echo "📲 Deploying to Heroku App: ${{ matrix.app_name }}..."
          
          # Setup Heroku Remote with API Key
          git remote add heroku-target https://heroku:$HEROKU_API_KEY@git.heroku.com/${{ matrix.app_name }}.git
          
          # Push only that folder
          git subtree push --prefix services/${{ matrix.service }} heroku-target main